name: SEO Audit

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm ci

      - name: Restore GSC credentials
        env:
          GSC_OAUTH_JSON: ${{ secrets.GSC_OAUTH_JSON }}
          GSC_TOKEN_JSON: ${{ secrets.GSC_TOKEN_JSON }}
        run: |
          if [ -z "$GSC_OAUTH_JSON" ] || [ -z "$GSC_TOKEN_JSON" ]; then
            echo "::error::Missing GSC_OAUTH_JSON or GSC_TOKEN_JSON secrets"
            exit 1
          fi
          printf '%s' "$GSC_OAUTH_JSON" > .gsc-oauth.json
          printf '%s' "$GSC_TOKEN_JSON" > .gsc-token.json
          chmod 600 .gsc-oauth.json .gsc-token.json

      - name: Pull GSC data
        run: node scripts/audit/pull-gsc.js

      - name: Generate report
        run: node scripts/audit/report.js

      - name: Commit audit to main
        run: |
          rm -f .gsc-oauth.json .gsc-token.json

          git config user.name 'audit-bot'
          git config user.email 'audit-bot@users.noreply.github.com'

          git add audits/
          if git diff --cached --quiet; then
            echo "No audit changes to commit."
            exit 0
          fi
          AUDIT_DATE=$(date -u +%Y-%m-%d)
          git commit -m "SEO audit: ${AUDIT_DATE}"
          git push origin main
